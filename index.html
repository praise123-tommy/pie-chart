<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Pie Matrix</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --neon-gold: #ffcc00;
            --neon-purple: #bc13fe;
            --dark-bg: #0a0a0f;
        }

        body {
            background: radial-gradient(circle at center, #1a1025 0%, var(--dark-bg) 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Moving Circular Waves Background */
        .wave-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(188, 19, 254, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            animation: pulseBg 10s ease-in-out infinite;
        }

        @keyframes pulseBg {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .glass-card {
            background: rgba(25, 10, 35, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(188, 19, 254, 0.3);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            transition: 0.4s ease;
        }

        .btn-neon-gold {
            background: transparent;
            border: 2px solid var(--neon-gold);
            color: var(--neon-gold);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
        }

        .btn-neon-gold:hover {
            background: var(--neon-gold);
            color: #000;
            box-shadow: 0 0 30px var(--neon-gold);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(188, 19, 254, 0.4) !important;
            color: white !important;
            border-radius: 12px;
        }

        .form-control:focus {
            border-color: var(--neon-gold) !important;
            box-shadow: 0 0 15px var(--neon-gold) !important;
        }

        .pie-container {
            position: relative;
            max-width: 450px;
            margin: auto;
        }
    </style>
</head>
<body>

    <div class="wave-bg"></div>

    <div class="container py-10">
        <header class="text-center mb-12">
            <h1 class="text-6xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-purple-600 uppercase italic">
                Orbital Data
            </h1>
            <p class="text-gray-400 tracking-tighter">[ PIE_CHART_MODE_ENABLED ]</p>
        </header>

        <div class="row g-5 align-items-center">
            <div class="col-lg-5">
                <div class="glass-card p-5">
                    <h2 class="text-yellow-500 font-bold mb-6 text-xl tracking-widest uppercase">Add Segment</h2>
                    <form id="pieForm">
                        <div class="mb-4">
                            <label class="block text-xs text-purple-400 mb-2 uppercase">Label Name</label>
                            <input type="text" id="pieLabel" class="form-control" placeholder="e.g. Assets" required>
                        </div>
                        <div class="mb-4">
                            <label class="block text-xs text-purple-400 mb-2 uppercase">Percentage / Value</label>
                            <input type="number" id="pieValue" class="form-control" placeholder="00" required>
                        </div>
                        <button type="submit" class="btn btn-neon-gold w-full py-3">Update Core</button>
                    </form>
                    
                    <div class="mt-8 flex gap-2">
                        <button id="downloadPdf" class="flex-1 text-[10px] border border-purple-500 text-purple-400 py-2 rounded hover:bg-purple-500 hover:text-white transition">PDF EXPORT</button>
                        <button id="clearData" class="flex-1 text-[10px] border border-red-800 text-red-500 py-2 rounded hover:bg-red-900 transition">PURGE DATA</button>
                    </div>
                </div>
            </div>

            <div id="captureArea" class="col-lg-7">
                <div class="glass-card p-5 text-center">
                    <h2 class="text-purple-400 font-bold mb-6 text-xl tracking-widest uppercase">Data Distribution</h2>
                    <div class="pie-container">
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="clickSfx" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

    <script>
        const { jsPDF } = window.jspdf;
        const ctx = document.getElementById('pieChart').getContext('2d');
        const clickSfx = document.getElementById('clickSfx');

        // --- LOCAL STORAGE ---
        const getPieData = () => {
            const data = localStorage.getItem('user_pie_data');
            return data ? JSON.parse(data) : { labels: [], values: [] };
        };

        const savePieData = (labels, values) => {
            localStorage.setItem('user_pie_data', JSON.stringify({ labels, values }));
        };

        let initialData = getPieData();

        // --- CHART CONFIG ---
        const pieChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: initialData.labels,
                datasets: [{
                    data: initialData.values,
                    backgroundColor: [
                        '#bc13fe', '#ffcc00', '#00f2ff', '#ff0055', '#39ff14', '#ffffff'
                    ],
                    borderColor: '#0a0a0f',
                    borderWidth: 5,
                    hoverOffset: 20
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: '#fff', font: { weight: 'bold' } }
                    }
                }
            }
        });

        // --- LOGIC ---
        document.getElementById('pieForm').addEventListener('submit', (e) => {
            e.preventDefault();
            clickSfx.play();

            const label = document.getElementById('pieLabel').value;
            const val = document.getElementById('pieValue').value;

            pieChart.data.labels.push(label);
            pieChart.data.datasets[0].data.push(val);
            pieChart.update();

            savePieData(pieChart.data.labels, pieChart.data.datasets[0].data);
            e.target.reset();
        });

        // PDF Export
        document.getElementById('downloadPdf').addEventListener('click', () => {
            const area = document.getElementById('captureArea');
            html2canvas(area, { backgroundColor: '#0a0a0f' }).then(canvas => {
                const img = canvas.toDataURL('image/png');
                const pdf = new jsPDF('l', 'mm', 'a4');
                pdf.text("System Orbital Report", 10, 10);
                pdf.addImage(img, 'PNG', 40, 20, 200, 160);
                pdf.save("Pie_Matrix_Report.pdf");
            });
        });

        // Clear
        document.getElementById('clearData').addEventListener('click', () => {
            if(confirm("Confirm deletion of orbital segments?")) {
                localStorage.removeItem('user_pie_data');
                pieChart.data.labels = [];
                pieChart.data.datasets[0].data = [];
                pieChart.update();
            }
        });
    </script>
</body>
</html>
